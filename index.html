<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
<title>致歉</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:PingFang SC,Microsoft YaHei,sans-serif}
body{background:linear-gradient(180deg,#f8f9fc,#fff5f7);min-height:100vh;padding:30px 22px;position:relative;overflow:hidden;color:#4a5568}

/* 🔥 升级动效：全屏固定 + 樱花随风摆动 */
.sakura{
  position: fixed;
  z-index: 0;
  background:#f2c2d1;
  border-radius:100% 0 100% 50%;
  animation: sakura-fall linear infinite;
}
.star{
  position: fixed;
  z-index: 0;
  width:3px;
  height:3px;
  background:#d1d5db;
  border-radius:50%;
  animation: star-fall linear infinite;
}

/* 樱花自然飘落（左右摆动+旋转） */
@keyframes sakura-fall {
  0% { transform: translate(0, -10px) rotate(0deg); opacity: 0.8; }
  100% { transform: translate(calc(-30px + var(--random)*60px), 100vh) rotate(720deg); opacity: 0; }
}
/* 星光飘落+闪烁 */
@keyframes star-fall {
  0% { transform: translateY(-10px); opacity: 0.9; }
  50% { opacity: 0.4; }
  100% { transform: translateY(100vh); opacity: 0; }
}

.container{max-width:380px;margin:0 auto;padding-top:60px;position:relative;z-index: 1;}
.title{text-align:center;font-size:24px;color:#8a94a3;margin-bottom:50px;letter-spacing:2px;opacity:0;animation:fadeIn 1.2s .4s forwards}
.text{font-size:16px;line-height:2.1;margin-bottom:26px;opacity:0;animation:fadeIn 1.3s forwards;color:#4a5568}
.t1{animation-delay:.9s}
.t2{animation-delay:1.6s}
.t3{animation-delay:2.3s}
.t4{animation-delay:3.0s}

/* ❌ 彻底删除了奇怪的圆圈！ */

.btn{display:block;margin:0 auto;padding:14px 40px;border-radius:8px;border:none;background:#8a94a3;color:#fff;font-size:15px;opacity:0;animation:fadeIn 1.2s 4.5s forwards;cursor: pointer;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.sign{text-align:right;margin-top:70px;font-size:14px;color:#9ca3af;opacity:0;animation:fadeIn 1.2s 4.8s forwards}
</style>
</head>
<body>
<div class="container">
<div class="title">🤍 郑重致歉</div>
<div class="text t1">这次是我的问题，没有借口，不辩解。</div>
<div class="text t2">我疏忽了你的感受，处理方式过于固执，让你受了委屈。</div>
<div class="text t3">你对我而言很重要，我不想因为我的失误，消耗彼此的情绪。</div>
<div class="text t4">我会认真反思，修正问题，用行动弥补。<br>希望能得到你的原谅。</div>

<button class="btn" onclick="alert('已记录，会认真改正。')">接受致歉</button>
<div class="sign">2026.04.08</div>
</div>

<script>
// 唯美星光
function createStar() {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + 'vw';
  star.style.animationDuration = (3 + Math.random() * 3) + 's';
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 6000);
}
setInterval(createStar, 400);

// 升级樱花：随机大小+随机摆动幅度
function createSakura() {
  const sakura = document.createElement('div');
  sakura.className = 'sakura';
  const size = 5 + Math.random() * 8;
  sakura.style.width = size + 'px';
  sakura.style.height = size * 1.4 + 'px';
  sakura.style.left = Math.random() * 100 + 'vw';
  sakura.style.setProperty('--random', Math.random());
  sakura.style.animationDuration = (5 + Math.random() * 4) + 's';
  document.body.appendChild(sakura);
  setTimeout(() => sakura.remove(), 8000);
}
setInterval(createSakura, 500);
</script>
</body>
</html>
